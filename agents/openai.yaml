interface:
  display_name: "GitHub Release Notes"
  short_description: "Draft diff-backed release notes, sync operator docs, validate a release QA inventory, and reuse or derive validated release header SVGs from repo branding."
  default_prompt: "Use $gh-release-notes to inspect the real diff and the implementing code paths for this tag, draft evidence-based GitHub release notes, create a companion docs walkthrough article by default when the repository has a docs surface unless the user narrows the scope, truth-sync README and primary operator docs when the release changes behavior or operations, write a release QA inventory artifact with the claim matrix and steady-state docs review, validate that artifact before closing the task, reuse and update an existing versioned release header SVG when the repository already has one, and when there is no versioned header yet derive a first release-header-v*.svg from suitable existing SVG branding such as assets/icon.svg, assets/logo.svg, or assets/social-card.svg only when the release would benefit from a hero image and the branding is actually suitable for reuse, validate every candidate source SVG before reusing it and validate the generated header SVG before publication, publish docs before linking to them from GitHub, and close the task only after the QA inventory covers implementation-sensitive claim checks, steady-state docs review, SVG validation, docs deployment, live URLs, tag creation, release publication, and verification."
