interface:
  display_name: "GitHub Release Notes"
  short_description: "Draft diff-backed release notes, sync operator docs, validate a release QA inventory, and reuse or derive validated release header SVGs from repo branding."
  default_prompt: "Use $gh-release-notes to inspect the real diff and implementing code paths for this tag, draft evidence-based GitHub release notes, create a companion docs walkthrough article by default when the repository has a docs surface unless the user narrows the scope, truth-sync README and primary operator docs when the release changes behavior or operations, write and validate a release QA inventory artifact, reuse or derive validated release-header SVGs when appropriate, publish docs before linking to them from GitHub, render GitHub release docs/article links as centered shields.io badges, use emoji-prefixed major GitHub release headings, and close the task only after the QA inventory covers implementation-sensitive claim checks, steady-state docs review, SVG validation, docs deployment, live URLs, tag creation, release publication, and final release-body verification."
