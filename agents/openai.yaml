interface:
  display_name: "GitHub Release Notes"
  short_description: "Draft diff-backed release notes, sync operator docs, validate a release QA inventory, and reuse versioned release header SVGs."
  default_prompt: "Use $gh-release-notes to inspect the real diff and the implementing code paths for this tag, draft evidence-based GitHub release notes, create a companion docs walkthrough article by default when the repository has a docs surface unless the user narrows the scope, truth-sync README and primary operator docs when the release changes behavior or operations, write a release QA inventory artifact with the claim matrix and steady-state docs review, validate that artifact before closing the task, reuse and update an existing versioned release header SVG when the repository already has one, publish docs before linking to them from GitHub, and close the task only after the QA inventory covers implementation-sensitive claim checks, steady-state docs review, docs deployment, live URLs, tag creation, release publication, and verification."
