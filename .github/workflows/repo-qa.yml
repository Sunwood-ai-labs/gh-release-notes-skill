name: Repo QA

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify repository surfaces
        shell: pwsh
        run: ./scripts/verify-repo-surfaces.ps1

      - name: Verify release QA inventory template
        shell: pwsh
        run: ./scripts/verify-release-qa-inventory.ps1 -Path ./references/release-qa-inventory-template.md

      - name: Verify release QA inventory fixture repo gate
        shell: pwsh
        run: ./scripts/verify-release-qa-inventory.ps1 -RepoPath ./fixtures/release-gate-fixture -Tag v9.9.9
